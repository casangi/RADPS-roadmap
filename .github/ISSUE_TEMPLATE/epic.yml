name: Epic
description: Describe a large body of work composed of multiple related features or tasks spanning the RADPS ecosystem.
title: "Epic: "
body:
  - type: markdown
    attributes:
      value: |
        An **epic** represents a significant, multi-part body of work. It may be broken down into individual feature issues, tasks, or implementation issues across one or more repositories.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A brief description of this epic and its overall goal.
      placeholder: "e.g. Implement end-to-end visibility calibration pipeline across xradio, astroviper, and calviper."
    validations:
      required: true

  - type: textarea
    id: DoD
    attributes:
      label: Definition of Done
      description: How will we know that the item is complete
      placeholder: "e.g. draft specification for calibration set generated, reviewed by team, and changes made based on the review."
    validations:
      required: true


  - type: textarea
    id: affected_repos
    attributes:
      label: Affected Repositories
      description: Which repositories are involved in this epic?
      placeholder: |
        - xradio
        - astroviper
    validations:
      required: false

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: What must be true for this epic to be considered done?
      placeholder: |
        - [ ] All child issues are resolved
        - [ ] End-to-end integration test passes in testviper
    validations:
      required: false
